name: 资料更新

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/update_trending.py
          python scripts/gen_share_text.py || true

      - name: commit
        run: |
          git config user.name "vinson-lee01"
          git config user.email "vinson-lee01@users.noreply.github.com"
          git add resources/ || true
          if ! git diff --cached --quiet; then
            git commit -m "update resources"
          fi
          git pull origin main --rebase 2>/dev/null || true
          git push origin main || true
